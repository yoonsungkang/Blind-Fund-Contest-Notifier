name: KDB 공지 알리미

on:
  schedule:
    - cron: '*/5 * * * *'    # 약 5분마다 (GitHub 사정에 따라 다소 지연될 수 있음)
  workflow_dispatch: {}        # Actions 탭에서 수동 실행 버튼

concurrency:
  group: kdb-notice
  cancel-in-progress: false

permissions:
  contents: write              # state.json 커밋용

jobs:
  check:
    runs-on: ubuntu-latest
    # Playwright 공식 이미지: 크로미움 + 시스템 의존성이 모두 포함돼 있어
    # apt-get update(러너의 깨진 MS 저장소 서명 오류)를 아예 거치지 않는다.
    container:
      image: mcr.microsoft.com/playwright/python:v1.48.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check notices
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_notices.py

      - name: Commit state if changed
        run: |
          # 컨테이너 안에서 workspace를 안전 디렉토리로 등록(git 소유권 경고 방지)
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git add state.json
          if git diff --cached --quiet; then
            echo "state 변화 없음 - 커밋 생략"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "update state [skip ci]"
            # 원격이 앞서 있어도 안전하게: 충돌 시 재동기화 후 재시도
            for i in 1 2 3; do
              if git push; then
                break
              fi
              echo "push 거부 - 원격과 동기화 후 재시도 ($i/3)"
              git pull --rebase --autostash origin main || true
            done
          fi
